<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, user-scalable=no">
<title>NOCTUNE UI manual</title>
<link rel="stylesheet" href="../css/style.css">
<style>
  #debug-panel { max-width: 480px; margin: 0 auto; padding: 12px 16px 40px; font-family: system-ui, sans-serif; }
  #debug-panel h2 { font-size: 13px; color: #6a829c; }
  #debug-panel button { display: inline-block; margin: 4px 6px 4px 0; padding: 8px 12px; border: 1px solid #2a4058; background: #0a1830; color: #e8f4ff; }
  #log { font-size: 11px; white-space: pre-wrap; color: #6a829c; margin-top: 10px; }
</style>
</head>
<body>
<div id="app"></div>
<div id="debug-panel">
  <h2>手動確認用パネル（本アプリのUIではない）</h2>
  <button data-go="home">home</button>
  <button data-go="settings">settings</button>
  <button data-go="setup">setup 和音当て</button>
  <button data-go="result">result</button>
  <div id="log"></div>
</div>
<script type="module">
import { nav } from '../js/ui/screens.js';
import { MODES } from '../js/modes/registry.js';

const log = (m) => { document.getElementById('log').textContent += m + '\n'; };

const mockState = {
  version: 3,
  settings: { a4: 442, noteStyle: 'doremi', volume: 0.8 },
  records: { 'oto-ate': { 'range=mid': 0.8 } },
  played: {},
  lastConfig: {},
};

nav.init({
  state: mockState,
  synth: { stopAll: () => log('stopAll'), playFx: () => {}, ensureRunning: async () => {} },
  modes: MODES,
  onRoundFinish: () => {},
  onSettingsChange: (patch) => log('settings ' + JSON.stringify(patch)),
});

nav.show('home');
log('home');

document.getElementById('debug-panel').addEventListener('click', (e) => {
  const go = e.target?.dataset?.go;
  if (!go) return;
  if (go === 'home') nav.show('home');
  else if (go === 'settings') nav.show('settings');
  else if (go === 'setup') nav.show('setup', { modeId: 'chord-ate' });
  else if (go === 'result') {
    nav.show('result', {
      modeId: 'chord-ate',
      config: { gen: 'harmonic', size: 3 },
      accuracy: 0.7,
      score: 420,
      summary: { detail: '7/10問正解' },
      record: { value: 0.7, display: '70%' },
      newBest: true,
      log: [
        {
          no: 1, correct: true, play: [],
          expected: { kind: 'pitch-set', labels: ['ド', 'ミ', 'ソ'], pcs: [0, 4, 7] },
          response: { kind: 'pitch-set', labels: ['ド', 'ミ', 'ソ'], pcs: [0, 4, 7] },
          detail: { modeId: 'chord-ate', gen: 'harmonic', targetPcs: [0, 4, 7], chord: { roles: [{ pc: 0, role: '根音' }, { pc: 4, role: '第3音' }, { pc: 7, role: '第5音' }] } },
        },
        {
          no: 2, correct: false, play: [],
          expected: { kind: 'pitch-set', labels: ['レ', 'ファ', 'ラ'], pcs: [2, 5, 9] },
          response: { kind: 'pitch-set', labels: ['レ', 'ソ', 'ラ'], pcs: [2, 7, 9] },
          detail: { modeId: 'chord-ate', gen: 'harmonic', targetPcs: [2, 5, 9], chord: { roles: [{ pc: 2, role: '根音' }, { pc: 5, role: '第3音' }, { pc: 9, role: '第5音' }] } },
        },
      ],
    });
  }
  log(go);
});
</script>
</body>
</html>
